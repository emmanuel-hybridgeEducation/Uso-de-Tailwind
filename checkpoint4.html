<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <div>
        <h1 class="text-4xl font-bold text-left">Dashboard</h1>
        <p>Bienvenido de nuevo, usuario</p>
    </div>
    <div>
    <div class="flex gap-6 mt-4 justify-around flex-1 p-4">
        <div class="border-2 flex-1">
            <p class="text-s font-semibold">Usuarios Totales</p>
            <p class="text-3xl font-bold text-black-500">9,100</p>
            <p class="text-xs">Aumento 1,093 esta semana...</p>
        </div> 
        <div class="border-2 flex-1">
            <p class="text-s font-semibold">Ingresos</p>
            <p class="text-3xl font-bold text-black-500">$24,780</p>
            <p class="text-xs">$2,587 más que el mes pasado...</p>
        </div>
        <div class="border-2 flex-1">
            <p class="text-s font-semibold">Sesiones Activas</p>
            <p class="text-3xl font-bold text-red-500">1,342</p>
            <p class="text-xs">42 menos que ayer...</p>
        </div>
        <div class="border-2 flex-1">
            <p class="text-s font-semibold">Usuarios Activos</p>
            <p class="text-3xl font-bold text-green-500">9,100</p>
            <p class="text-xs"> Aumento 1,093 esta semana...</p>
        </div>
    </div>
    <div class="flex mt-8">
        <!-- Gráfica de línea -->
        <canvas id="lineChart" class="border-2 w-1/2 m-8 max-w-md"></canvas>
        <!-- Gráfica de barras -->
        <canvas id="barChart" class="border-2 w-1/2 m-8 max-w-md"></canvas>
    </div>
    </div>
  <script>
    // Datos para la gráfica de línea
    const lineCtx = document.getElementById('lineChart').getContext('2d');
    const lineChart = new Chart(lineCtx, {
      type: 'line',
      data: {
        labels: ['Ene', 'Feb', 'Mar', 'Abr', 'May', 'Jun', 'Jul', 'Ago', 'Sep', 'Oct', 'Nov', 'Dic'],
        datasets: [{
          label: 'Usuarios 2024',
          data: [5000, 5500, 6000, 6200, 6800, 7200, 7500, 8000, 8249, 8500, 8800, 9100],
          borderColor: 'rgb(59, 130, 246)',
          backgroundColor: 'rgba(59, 130, 246, 0.1)',
          tension: 0.3,
          fill: true
        }, {
          label: 'Usuarios 2023',
          data: [4000, 4200, 4500, 4800, 5100, 5400, 5600, 5900, 6200, 6500, 6800, 7000],
          borderColor: 'rgb(107, 114, 128)',
          backgroundColor: 'rgba(107, 114, 128, 0.1)',
          tension: 0.3,
          fill: true
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: {
            position: 'top',
          }
        },
        scales: {
          y: {
            beginAtZero: true
          }
        }
      }
    });

    // Datos para la gráfica de barras
    const barCtx = document.getElementById('barChart').getContext('2d');
    const barChart = new Chart(barCtx, {
      type: 'bar',
      data: {
        labels: ['Ene', 'Feb', 'Mar', 'Abr', 'May', 'Jun', 'Jul', 'Ago', 'Sep', 'Oct', 'Nov', 'Dic'],
        datasets: [{
          label: 'Ingresos 2024 ($)',
          data: [15000, 16500, 18000, 19500, 21000, 22500, 23000, 24000, 24780, 26000, 27500, 29000],
          backgroundColor: 'rgba(59, 130, 246, 0.8)'
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: {
            position: 'top',
          }
        },
        scales: {
          y: {
            beginAtZero: true
          }
        }
      }
    });
  </script>
  </body>
</html>
